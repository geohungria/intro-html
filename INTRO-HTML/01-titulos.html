<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conhecendo Tags de Títulos</title>
</head>
<body>
    <!-- Existem 6 níveis de títulos em HTML, do h1 ao h6 -->
    <h1>Conhecendo Tags de Títulos</h1> <!-- O ideal é que tenha um unico elemento h1 por página -->
    <h2>Tag h2</h2>
    <h3>Tag h3</h3>
    <h4>Tag h4</h4>
    <h5>Tag h5</h5>
    <h6>Tag h6</h6>
</body>
</html>
