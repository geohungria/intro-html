<!DOCTYPE html> <!--< informa o navegador sobre o tipo de documento/arquivo que estamos usando, no caso html v5-->  
<!-- HTML é a raiz do documento, tudo comeca aqui. todo o conteudo da pagina fica aqui dentro-->
<html lang="pt-br">  <!-- lang = linguage = idioma -->
<head> <!-- head = cabecalho, onde ficam as informacoes sobre a pagina, como titulo, autor, palavras-chave, etc. -->
    <meta charset="UTF-8"> <!-- charset = character set = conjunto de caracteres, UTF-8 é o mais comum, suporta a maioria dos caracteres do mundo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- viewport = area de visualizacao, width=device-width = largura da tela do dispositivo, initial-scale=1.0 = zoom inicial -->
    <title>Hello, World!</title> <!-- title = titulo da pagina, aparece na aba do navegador -->
</head>
<body> <!-- body = corpo, onde fica o conteudo da pagina, o que aparece para o usuario -->
    <h1>Hello, World!</h1> <!-- h1 = heading 1 = titulo 1, o mais importante, tem a maior fonte -->    
</body>
</html> <!-- fecha a tag html, indicando o fim do documento -->
